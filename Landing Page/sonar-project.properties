# SonarQube / SonarCloud Configuration
sonar.projectKey=health-landing-page
sonar.projectName=Health Landing Page
sonar.projectVersion=0.1.0

# Source code
sonar.sources=src
sonar.tests=src
sonar.test.inclusions=src/**/*.test.ts,src/**/*.test.tsx,src/**/*.spec.ts,src/**/*.spec.tsx

# TypeScript
sonar.typescript.tsconfigPath=tsconfig.json

# Exclusions
sonar.exclusions=\
  src/**/*.test.ts,\
  src/**/*.test.tsx,\
  src/**/*.spec.ts,\
  src/**/*.spec.tsx,\
  cypress/**

# Coverage
sonar.javascript.lcov.reportPaths=coverage/lcov.info

# Node.js
sonar.nodejs.executable=<node>

# Encoding
sonar.sourceEncoding=UTF-8