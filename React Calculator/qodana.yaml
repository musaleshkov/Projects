# Qodana Configuration
# https://www.jetbrains.com/help/qodana/

version: "1.0"

profile:
  name: qodana.recommended

exclude:
  - name: All
    paths:
      - node_modules
      - build
      - coverage
      - public
      - .git
      - .yarn
      - "*.test.js"
      - "*.test.jsx"
      - "*.spec.js"
      - "*.spec.jsx"

linter: jetbrains/qodana-js:latest

include:
  - name: EcmaScript6
  - name: React
  - name: JSX
  - name: Css
  - name: Html

plugins:
  - id: SonarJS